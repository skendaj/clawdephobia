name: Clawdephobia
options:
  bundleIdPrefix: com.clawdephobia
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: 1.0.0
targets:
  Clawdephobia:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/AppIcon.icns
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudephobia.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Claudephobia.entitlements
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        COMBINE_HIDPI_IMAGES: true
        CODE_SIGN_STYLE: Manual
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_ENTITLEMENTS: Resources/Claudephobia-DevID.entitlements
          CODE_SIGN_STYLE: Manual
          CODE_SIGNING_REQUIRED: NO
