name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          rm $RUNNER_TEMP/cert.p12

          # Allow codesign to access keychain without prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app bundle
        run: |
          xcodebuild archive \
            -project Clawdphobia.xcodeproj \
            -scheme Claudephobia \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Claudephobia.xcarchive" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=53CZ5753ZD

          cp -R "$RUNNER_TEMP/Claudephobia.xcarchive/Products/Applications/Claudephobia.app" ./Claudephobia.app
          codesign --verify --verbose ./Claudephobia.app

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        timeout-minutes: 30
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ZIP_NAME="Claudephobia-${VERSION}.zip"
          zip -r "$ZIP_NAME" Claudephobia.app

          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

          # Submit for notarization
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$ZIP_NAME" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --output-format json 2>&1) || true

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null)

          if [ -z "$SUBMISSION_ID" ]; then
            echo "::error::Failed to submit for notarization"
            echo "$SUBMIT_OUTPUT"
            exit 1
          fi

          echo "Submission ID: $SUBMISSION_ID"

          # Poll for completion (up to 20 minutes)
          if xcrun notarytool wait "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --timeout 20m; then

            # Check final status
            STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --output-format json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" 2>/dev/null)

            echo "Notarization status: $STATUS"

            if [ "$STATUS" = "Accepted" ]; then
              xcrun stapler staple Claudephobia.app
              rm "$ZIP_NAME"
              zip -r "$ZIP_NAME" Claudephobia.app
              echo "NOTARIZED=true" >> "$GITHUB_ENV"
            else
              echo "::error::Notarization rejected. Fetching log..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_PASSWORD" || true
              exit 1
            fi
          else
            echo "::error::Notarization timed out. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" || true
            exit 1
          fi

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db || true

      - name: Create stable download name
        run: cp "$ZIP_NAME" Claudephobia.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            Claudephobia.zip
          generate_release_notes: true
